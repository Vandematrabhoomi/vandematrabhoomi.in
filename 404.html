<!-- ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

<meta property="og:title" content="‡§µ‡§Ç‡§¶‡•á ‡§Æ‡§æ‡§§‡•É‡§≠‡•Ç‡§Æ‡§ø‚Ñ¢ ‚Äî Vande Matrabhoomi‚Ñ¢">

<meta property="og:site_name" content="Vande Matrabhoomi‚Ñ¢">

<style>
body{font-family:Georgia,"Noto Serif Devanagari",serif;max-width:720px;margin:0 auto;padding:24px;color:#1a0000;line-height:1.7;background:#fffdf9;}
.masthead{display:flex;align-items:center;gap:10px;margin-bottom:24px;border-bottom:3px solid #cc0000;padding-bottom:14px;}

<body>
<div class="masthead"><img src="/assets/vande-logo.png" alt=""><span>‡§µ‡§Ç‡§¶‡•á ‡§Æ‡§æ‡§§‡•É‡§≠‡•Ç‡§Æ‡§ø‚Ñ¢ ‚Äî Vande Matrabhoomi‚Ñ¢</span></div>
<div id="out"><div class="spin"></div></div>
<script>
(function () {
  var API = 'https://script.google.com/macros/s/AKfycbw_UDz41q9C-qnNwkZ5YUnmliSr08i1daJSvvaPi7aXnaH6TQMK-iTwwfQAfAtEZt52/exec';
  var out = document.getElementById('out');

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function notFound() {
    document.title = '‡§™‡•É‡§∑‡•ç‡§† ‡§®‡§π‡•Ä‡§Ç ‡§Æ‡§ø‡§≤‡§æ ‚Äî Vande Matrabhoomi‚Ñ¢';
    out.innerHTML = '<div class="nf">'
      + '<h1>‡§Ø‡§π ‡§™‡•É‡§∑‡•ç‡§† ‡§®‡§π‡•Ä‡§Ç ‡§Æ‡§ø‡§≤‡§æ ¬∑ This page could not be found</h1>'
      + '<p>‡§π‡•ã ‡§∏‡§ï‡§§‡§æ ‡§π‡•à ‡§Ø‡§π ‡§≤‡•á‡§ñ ‡§π‡§ü‡§æ ‡§¶‡§ø‡§Ø‡§æ ‡§ó‡§Ø‡§æ ‡§π‡•ã‡•§<br>The article may have been removed.</p>'
      + '<a class="back" href="/">‚Üê ‡§µ‡§Ç‡§¶‡•á ‡§Æ‡§æ‡§§‡•É‡§≠‡•Ç‡§Æ‡§ø‚Ñ¢ ‡§Æ‡•Å‡§ñ‡§™‡•É‡§∑‡•ç‡§† ‡§™‡§∞ ‡§ú‡§æ‡§è‡§Å ¬∑ Go to the Vande Matrabhoomi‚Ñ¢ homepage</a>'
      + '</div>';
  }

  function render(story, photo) {
    var lang = story.lang === 'en' ? 'en' : 'hi';
    document.documentElement.lang = lang;
    document.title = (story.hl || '') + ' ‚Äî Vande Matrabhoomi‚Ñ¢';
    var backLabel = lang === 'hi' ? '‚Üê ‡§µ‡§Ç‡§¶‡•á ‡§Æ‡§æ‡§§‡•É‡§≠‡•Ç‡§Æ‡§ø‚Ñ¢ ‡§™‡§∞ ‡§î‡§∞ ‡§™‡§¢‡§º‡•á‡§Ç' : '‚Üê Read more on Vande Matrabhoomi‚Ñ¢';
    var img = photo || story.mediaUrl || '';
    var html = '<div class="cat">' + esc(story.cat || '') + '</div>'
      + '<h1>' + esc(story.hl || '') + '</h1>'
      + (img ? '<img class="hero" src="' + esc(img) + '" alt="" onerror="this.remove();">' : '');
    String(story.body || story.sum || '').split(/\n\n+/).forEach(function (p) {
      p = p.trim();
      if (p) html += '<p>' + esc(p) + '</p>';
    });
    html += '<a class="back" href="/#opinion">' + esc(backLabel) + '</a>';
    out.innerHTML = html;
  }

  // Accept /a/<id>.html (the shared article links) and ?id=<id> (manual).
  var m = location.pathname.match(/^\/a\/([A-Za-z0-9_-]+)\.html?$/)
       || location.search.match(/[?&]id=([A-Za-z0-9_-]+)/);
  if (!m) { notFound(); return; }
  var id = m[1];

  fetch(API + '?type=story')
    .then(function (r) { return r.json(); })
    .then(function (list) {
      var story = (list || []).filter(function (s) { return String(s.id) === String(id); })[0];
      if (!story) { notFound(); return; }
      if (story.mediaUrl) { render(story, ''); return; }
      // No baked photo yet ‚Äî the image may still be sitting in the sheet
      // as base64 chunks waiting for the Actions job. Pull it directly so
      // the article shows its photo right away anyway.
      fetch(API + '?type=media')
        .then(function (r) { return r.json(); })
        .then(function (media) {
          var mine = (media || []).filter(function (x) { return String(x.id) === String(id); })[0];
          var photo = (mine && mine.chunks && mine.chunks.length)
            ? 'data:image/jpeg;base64,' + mine.chunks.join('') : '';
          render(story, photo);
        })
        .catch(function () { render(story, ''); });
    })
    .catch(function () {
      out.innerHTML = '<div class="nf"><h1>‡§≤‡•á‡§ñ ‡§≤‡•ã‡§° ‡§®‡§π‡•Ä‡§Ç ‡§π‡•ã ‡§∏‡§ï‡§æ ¬∑ The article could not be loaded</h1>'
        + '<p><a class="back" href="javascript:location.reload()">‚Üª ‡§™‡•Å‡§®‡§É ‡§™‡•ç‡§∞‡§Ø‡§æ‡§∏ ‡§ï‡§∞‡•á‡§Ç ¬∑ Try again</a></p>'
        + '<a class="back" href="/">‚Üê ‡§Æ‡•Å‡§ñ‡§™‡•É‡§∑‡•ç‡§† ¬∑ Homepage</a></div>';
    });
})();
</script>
