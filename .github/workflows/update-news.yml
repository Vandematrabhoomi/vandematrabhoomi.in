name: Update News

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest news
        run: python fetch_news.py

      - name: Process Live Desk photos
        run: python process_livedesk_media.py

      - name: Generate shareable article pages
        run: python generate_article_pages.py

      - name: Commit and push if changed
        run: |
          git config user.name "vm-news-bot"
          git config user.email "actions@github.com"
          mkdir -p a assets/livedesk
          git add news-data.js a/ assets/livedesk/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "news update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
